<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="x-apple-disable-message-reformatting">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>{{appName}}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f6f8;color:#17202a;font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;font-size:1px;line-height:1px;">
      {{preheader}}
    </div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background-color:#f4f6f8;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:100%;max-width:600px;border-collapse:collapse;background-color:#ffffff;border:1px solid #d8dee6;">
            <tr>
              <td style="padding:0;background-color:#0f1720;height:6px;font-size:0;line-height:0;">&nbsp;</td>
            </tr>
            <tr>
              <td style="padding:32px 40px 24px 40px;">
                <p style="margin:0 0 10px 0;font-size:12px;line-height:16px;text-transform:uppercase;letter-spacing:0.08em;color:#5d6b7a;font-weight:700;">{{appName}}</p>
                <h1 style="margin:0;font-size:24px;line-height:32px;font-weight:700;color:#17202a;">{{title}}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 32px 40px;">
                <p style="margin:0 0 16px 0;font-size:16px;line-height:24px;color:#17202a;">{{greeting}}</p>
                <p style="margin:0 0 28px 0;font-size:16px;line-height:24px;color:#4b5968;">{{body}}</p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin:0 0 28px 0;">
                  <tr>
                    <td bgcolor="#0f1720" style="background-color:#0f1720;">
                      <a href="{{actionUrl}}" style="display:inline-block;padding:13px 22px;font-size:14px;line-height:20px;font-weight:700;color:#ffffff;text-decoration:none;">{{buttonText}}</a>
                    </td>
                  </tr>
                </table>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background-color:#f7f9fb;border:1px solid #e1e7ef;">
                  <tr>
                    <td style="padding:16px 18px;">
                      <p style="margin:0 0 10px 0;font-size:14px;line-height:22px;color:#5d6b7a;">{{expiryNote}}</p>
                      <a href="{{actionUrl}}" style="font-size:13px;line-height:20px;color:#0f1720;text-decoration:underline;word-break:break-all;">{{actionUrl}}</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 40px;background-color:#f7f9fb;border-top:1px solid #e1e7ef;">
                <p style="margin:0;font-size:12px;line-height:18px;color:#7b8794;">
                  {{automatedNote}}
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
